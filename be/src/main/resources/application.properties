quarkus.http.port=8080
quarkus.banner.enabled=false

# Caffeine cache configuration
quarkus.cache.caffeine."poetry-metrics-cache".initial-capacity=1000
quarkus.cache.caffeine."poetry-metrics-cache".maximum-size=10000
quarkus.cache.caffeine."poetry-metrics-cache".expire-after-write=365d
# LangChain4j OpenAI-compatible provider (Groq/Ollama)
quarkus.langchain4j.openai.api-key=${OPENAI_COMPAT_API_KEY:change-me}
quarkus.langchain4j.openai.base-url=${OPENAI_COMPAT_BASE_URL:http://localhost:11434/v1}

quarkus.langchain4j.openai.chat-model.model-name=${OPENAI_COMPAT_MODEL:llama3.1}
quarkus.langchain4j.openai.timeout=PT30S

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui


# 🐳 docker-compose.yml (Local Integration Test)
services:
  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: arturo-db
    environment:
      POSTGRES_USER: arturo
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: myapp_db
    ports:
      - "5432:5432"
    networks:
      - arturo-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arturo -d myapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- BACKEND (Java Quarkus) ---
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: arturo-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Mapping delle variabili Quarkus per connettersi al container DB
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/myapp_db
      QUARKUS_DATASOURCE_USERNAME: arturo
      QUARKUS_DATASOURCE_PASSWORD: supersecretpassword
      # Configura CORS per permettere al Frontend di parlare con l'API
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:4200,http://localhost"
    ports:
      - "8080:8080"
    networks:
      - arturo-network

  # --- FRONTEND (Angular + Nginx) ---
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: arturo-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - arturo-network

networks:
  arturo-network:
    driver: bridge

volumes:
  postgres_data: